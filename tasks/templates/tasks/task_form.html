{% extends "base.html" %}

{% block title %}{{ page_title }}{% endblock %}

{% block content %}
<section class="page-header">
    <h1>{{ page_title }}</h1>
</section>

<div class="form-card">
    <form method="post">
        {% csrf_token %}

        {% for field in form %}
            <div class="form-group">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}

                {% if field.errors %}
                    <div class="form-error">
                        {{ field.errors }}
                    </div>
                {% endif %}
            </div>
        {% endfor %}

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">{{ button_text }}</button>

            {% if task %}
                <a href="{% url 'tasks:detail' task.pk %}" class="btn btn-secondary">Отмена</a>
            {% else %}
                <a href="{% url 'tasks:list' %}" class="btn btn-secondary">Отмена</a>
            {% endif %}
        </div>
    </form>
</div>
{% endblock %}
