<header class="site-header">
    <div class="container header-inner">
        <a href="/tasks/" class="logo">Task Management Service</a>

        <nav class="nav">
            <a href="/tasks/">Задачи</a>
            <a href="/projects/">Проекты</a>
            <a href="/reports/">Отчёты</a>

            {% if user.is_authenticated %}
                <a href="/tasks/create/" class="btn-create">+ Новая задача</a>

                <a href="{% url 'users:notification_settings' %}" class="btn-create">
                    {% if user.telegram_chat_id %}
                        Настройки уведомлений
                    {% else %}
                        Подключить уведомления
                    {% endif %}
                </a>

                <a href="{% url 'users:profile' %}" class="btn-create">
                    Мой профиль
                </a>

                <span class="user-greeting">
                    Привет, {{ user.username }}
                </span>

                <form method="post"
                      action="{% url 'users:logout' %}"
                      class="logout-form">
                    {% csrf_token %}
                    <button type="submit"
                            class="btn-create btn-logout">
                        Выйти
                    </button>
                </form>
            {% else %}
                <a href="{% url 'users:login' %}"
                   class="btn-create">
                    Войти
                </a>
            {% endif %}
        </nav>
    </div>
</header>
