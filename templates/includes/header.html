<header class="site-header">
    <div class="container header-inner">
        <a href="/" class="logo">Task Management Service</a>

        <nav class="nav">
            <a href="/">Главная</a>
            <a href="/tasks/">Задачи</a>
            <a href="/projects/">Проекты</a>
            {% if user.is_authenticated %}
                <a href="/tasks/create/" class="btn-create">+ Новая задача</a>
            {% endif %}
            {% if user.is_authenticated %}
                <span class="user-greeting">Привет, {{ user.username }}</span>

                <form method="post" action="{% url 'users:logout' %}" class="logout-form">
                    {% csrf_token %}
                    <button type="submit" class="btn-create btn-logout">Выйти</button>
                </form>
            {% else %}
                <a href="{% url 'users:login' %}" class="btn-create">Войти</a>
            {% endif %}
        </nav>
    </div>
</header>
