{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <h1>{% if object %}Редактирование проекта{% else %}Создание проекта{% endif %}</h1>
</div>

<form method="post" class="form-card">
    {% csrf_token %}

    <div class="form-group">
        <label for="{{ form.name.id_for_label }}">Название проекта</label>
        {{ form.name }}
    </div>

    <div class="form-group">
        <label for="{{ form.description.id_for_label }}">Описание</label>
        {{ form.description }}
    </div>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">
            {% if object %}Сохранить{% else %}Создать{% endif %}
        </button>

        {% if object and object.owner == request.user %}
            <a href="{% url 'projects:edit' object.pk %}" class="btn btn-secondary">
                Редактировать
            </a>
        {% endif %}
    </div>
</form>
{% endblock %}
